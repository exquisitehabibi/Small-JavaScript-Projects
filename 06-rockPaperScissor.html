<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        
    </style>
</head>
<body>
    <H1>Rock Paper Scissors</H1>
    <button onclick="rps('Rock')">Rock</button>
    <button onclick="rps('Paper')">Paper</button>
    <button onclick="rps('Scissors')">Scissors</button>

    <script>
        function rps(u){
            let num = Math.random();
            let c = '';
            if(num >= 0 && num <= 1/3){ c='Rock';}
            else if(num > 1/3 && num < 2/3){ c ='Paper';}
            else{c='Scissors';}
            if((u=='Rock' && c =='Rock') || (u=='Paper' && c =='Paper') ||(u=='Scissors' && c =='Scissors')){
                alert(`You chose ${u} and the computer chose ${c}. It's a draw!`);
            }
            else if((u=='Rock' && c =='Scissors') || (u=='Paper' && c =='Rock')||(u=='Scissors' && c =='Paper')){
                alert(`You chose ${u} and the computer chose ${c}. You win!`);
            } 
            else{
                alert(`You chose ${u} and the computer chose ${c}. You lose!`);
            }
        }
    </script>
    
</body>
</html>
