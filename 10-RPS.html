<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="Stylesheets/10-RPS.css">

<body>
    <H1>Rock Paper Scissors</H1>
    <button class="rock play" onclick="rps('Rock')"><img src="./Assets/Rock.jpg" alt="Rock" height="100px"></button>

    <p class="rec">Wins: 0, Losses: 0 and Draws: 0.</p>
    <button class="Res-button" onclick="resB();">Reset Button</button>
