<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: white;
            font-size: 200%;
        }
        button{
            border-radius: 100%;
            border: none;
            padding: 10px 17px;
            background-color: gray;
            font-size: 80%;
        }
        .operators{
            background-color: orange;
        }
    </style>
</head>
<body>
    <p class="disp">0</p>
    <p>
        <button onclick="calc('1')">1</button>
        <button onclick="calc('2')">2</button>
        <button onclick="calc('3')">3</button>
        <button class="operators" onclick="calc('+')">+</button>
    </p>
    <p>
        <button onclick="calc('4')">4</button>
        <button onclick="calc('5')">5</button>
        <button onclick="calc('6')">6</button>
        <button class="operators" onclick="calc('-')">-</button>
    </p>
    <p>
        <button onclick="calc('7')">7</button>
        <button onclick="calc('8')">8</button>
        <button onclick="calc('9')">9</button>
        <button class="operators" onclick="calc('*')">*</button>
    </p>
    <p>
        <button onclick="calc('0')">0</button>
        <button onclick="calc('.')">.</button>
        <button onclick="calc('=')">=</button>
        <button class="operators" onclick="calc('/')">/</button>
    </p>
    <button onclick="res()">Clear</button>
    
    <script>
        let dis = "";

        function calc(c){
            if(c=='='){
                let res = eval(dis);
                document.querySelector('.disp').innerHTML= res;
                dis=res;
                return;
            }
            dis+=c;
            document.querySelector('.disp').innerHTML= dis;

        }

        function res(){
            dis="";
            document.querySelector('.disp').innerHTML= dis ||"0";
        }
    </script>
</body>
</html>
