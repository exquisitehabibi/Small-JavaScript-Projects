<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="Stylesheets/12-AdvFunc-RPS.css">
</head>
<body>
    <H1>Rock Paper Scissors</H1>
    <button class="rock play" onclick="rps('Rock')"><img src="./Assets/Rock.jpg" alt="Rock" height="100px"></button>
    <button class="paper play" onclick="rps('Paper')"><img src="./Assets/Paper.jpg" alt="Paper" height="100px"></button>
    <button class="scissors play" onclick="rps('Scissors')"><img src="./Assets/Scissors.jpg" alt="Scissors" height="100px"></button>
    <p class="selection"></p>
    <p class="res"></p>
    <p class="rec">Wins: 0, Losses: 0 and Draws: 0.</p>
    <button class="Res-button" onclick="resB();">Reset Button</button>
    <button class="playPauseBtn" onclick="playPause();">Auto Play</button>

    <!-- scrrrrrrrrrriiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiippppppppppppppppppptttttttttttttttttttttttttttttttttttttttttttttttttttt -->
    <script>
        let wins = 0;
        let losses = 0;
        let draws = 0;
        function rps(u){
            let num = Math.random();
            let c = '';
            if(num >= 0 && num <= 1/3){ c='Rock';}
            else if(num > 1/3 && num < 2/3){ c ='Paper';}
            else{c='Scissors';}
            let user = u+'.jpg';
            let comp = c+'.jpg';
            document.querySelector('.selection').innerHTML=`You <img src="./Assets/${user}" alt="${u}" height="50px"> V/S <img src="./Assets/${comp}" alt="${c}" height="50px">Computer `;
            if((u=='Rock' && c =='Rock') || (u=='Paper' && c =='Paper') ||(u=='Scissors' && c =='Scissors')){
                document.querySelector('.res').innerHTML="It's a draw!";
                draws++;
            }
            else if((u=='Rock' && c =='Scissors') || (u=='Paper' && c =='Rock')||(u=='Scissors' && c =='Paper')){
                document.querySelector('.res').innerHTML="You win!";
                wins++;
            } 
            else{
                document.querySelector('.res').innerHTML="You lose!";
                losses++;
            }
            document.querySelector('.rec').innerHTML=`Wins: ${wins}, Losses: ${losses} and Draws: ${draws}.`;
        }

        let playPauseBtn = document.querySelector('.playPauseBtn');
        let playInterval;
        function playPause(){
            if(playPauseBtn.innerHTML=="Auto Play"){
                playPauseBtn.innerHTML="Stop AutoPlay";

                playInterval = setInterval(function(){
                        let num = Math.random();
                        let c = '';
                        if(num >= 0 && num <= 1/3){ c='Rock';}
                        else if(num > 1/3 && num < 2/3){ c ='Paper';}
                        else{c='Scissors';}
                        rps(c);
                    },1300);
            }
            else{
                playPauseBtn.innerHTML="Auto Play";
                clearInterval(playInterval);
                
            }
        }
        function resB(){
            wins = 0;
            losses = 0;
            draws = 0;
            document.querySelector('.res').innerHTML="";
            document.querySelector('.selection').innerHTML="";
            document.querySelector('.rec').innerHTML=`Wins: ${wins}, Losses: ${losses} and Draws: ${draws}.`;

        }
    </script>
    
</body>
</html>
