
<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
    <style>
    .js-subscribe-button{
    border-radius: 25px;
    margin: 2px;
    padding: 10px;
    border:none;
    background-color: red;
    color: white;
    cursor: pointer;
    }

    .js-cost-input{
      padding: 10px;
      text-align: center;
      
    }

    .CalcButton{
      background-color: green;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
    }
    .js-error{
        color: red;
    }
    
    </style>
  </head>
  <body>
    <p>YouTube Subscribe Button</p>
    <button onclick="
      subscribe();
    " class="js-subscribe-button">
      Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of order" class="js-cost-input" onkeydown="
      handleCostKeydown(event);
    ">
    <button class="CalcButton" onclick="
      calculateTotal();
    ">Calculate</button>
    <p class="js-error">Error: Cost cannot be less than $0</p>
    <p class="js-total-cost"></p>

    <script>

        let erp = document.querySelector('.js-error');
        erp.style.display = "none";

      function handleCostKeydown(event) {
        if (event.key === 'Enter') {
          calculateTotal();
        }
      }

      function calculateTotal() {
        const inputElement = document.querySelector('.js-cost-input');
        let cost = Number(inputElement.value);
        if(cost<0){
            erp.style.display='block';
            return;
        }
        erp.style.display='none';
        cost = cost*100;
        if (cost < 4000) {
          cost = cost + 1000;
        }

        document.querySelector('.js-total-cost')
          .innerHTML = `$${cost/100}`;
      }

      function subscribe() {
        const buttonElement = document.querySelector('.js-subscribe-button');

        if (buttonElement.innerText === 'Subscribe') {
          buttonElement.innerHTML = 'Subscribed';
          buttonElement.style.backgroundColor='black';
        } else {
          buttonElement.innerHTML = 'Subscribe';
          buttonElement.style.backgroundColor='red';
        }
      }
      
    </script>
  </body>
</html>
